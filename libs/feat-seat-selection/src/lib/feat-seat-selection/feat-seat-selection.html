<div class="cinema-room">
  <div class="screen-label">SCREEN</div>
  <div class="screen"></div>

  <table ngGrid
    [multi]="true"
    [enableSelection]="true"
    [selectionMode]="'explicit'"
    [rowWrap]="'nowrap'"
    [colWrap]="'nowrap'"
    aria-label="Cinema seat selection">

    @for (row of seatRows(); track row.label) {
      <tr ngGridRow>
        <th class="row-label">{{ row.label }}</th>
        @for (seat of row.seats; track seat.id) {
          <td ngGridCell
            [disabled]="seat.occupied"
            [(selected)]="seat.selected"
            [attr.aria-label]="'Row ' + row.label + ' Seat ' + seat.number + (seat.occupied ? ' occupied' : seat.selected() ? ' selected' : ' available')">
            {{ seat.number }}
          </td>
        }
      </tr>
    }
  </table>

  <div class="legend">
    <span class="legend-item"><span class="swatch available"></span> Available</span>
    <span class="legend-item"><span class="swatch selected"></span> Selected</span>
    <span class="legend-item"><span class="swatch occupied"></span> Occupied</span>
  </div>

  <p class="selection-info" aria-live="polite">
    {{ selectedCount() }} seat(s) selected
  </p>
</div>
